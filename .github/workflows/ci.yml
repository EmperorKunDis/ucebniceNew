name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, Type Check, Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Prisma client
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-client-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}
          restore-keys: prisma-client-${{ runner.os }}-

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Validate content references
        run: npm run validate:content

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --runInBand --ci

      - name: Generate coverage report
        run: npm test -- --runInBand --ci --coverage --coverageThreshold='{}'
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Prisma client
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-client-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}
          restore-keys: prisma-client-${{ runner.os }}-

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXTAUTH_SECRET: ci-placeholder-secret
          NEXTAUTH_URL: http://localhost:3000
          SKIP_ENV_VALIDATION: true

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          include-hidden-files: true
          retention-days: 3

  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config
        env:
          DOMAIN: example.com
          ACME_EMAIL: admin@example.com
          POSTGRES_PASSWORD: ci-postgres-password
          NEXTAUTH_SECRET: ci-nextauth-secret
