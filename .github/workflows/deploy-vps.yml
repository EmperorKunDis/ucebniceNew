name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        run: ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}

      - name: Deploy
        run: |
          ssh -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_APP_DIR' && RELEASE_REF='$RELEASE_REF' HEALTH_URL='$HEALTH_URL' APP_DIR='$VPS_APP_DIR' bash scripts/deploy-vps.sh"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          RELEASE_REF: ${{ inputs.ref }}
          HEALTH_URL: ${{ secrets.PRODUCTION_HEALTH_URL }}
