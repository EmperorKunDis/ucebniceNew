# Production values for ucebnice
# Override default values.yaml for production environment

replicaCount: 3

image:
  repository: harbor.praut.cz/ucebnice/ucebnice-app
  pullPolicy: Always
  tag: "v1.0.19"  # Update this with actual version tags

# Image pull secrets are created via Sealed Secrets
# See: argocd/harbor-registry-sealed-secret.yaml
imagePullSecrets:
  - name: harbor-registry-secret

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: ucebnice.praut.cz  # CHANGE THIS
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ucebnice-production-tls
      hosts:
        - ucebnice.praut.cz  # CHANGE THIS

config:
  NEXTAUTH_URL: "https://ucebnice.praut.cz"  # CHANGE THIS
  NODE_ENV: "production"

# Secrets are managed via Sealed Secrets
# See: argocd/ucebnice-sealed-secret.yaml
# The sealed secret creates a secret named "ucebnice-secret" with these keys:
#   - DATABASE_URL
#   - NEXTAUTH_SECRET
#   - GOOGLE_CLIENT_ID
#   - GOOGLE_CLIENT_SECRET
#   - UPSTASH_REDIS_REST_URL
#   - UPSTASH_REDIS_REST_TOKEN
#   - NEXT_PUBLIC_SENTRY_DSN
#
# To create/update sealed secrets, run:
#   ./scripts/kubernetes/create-sealed-secrets.sh ucebnice
secrets: {}

prisma:
  runMigrations: true  # Enable for initial setup, then disable
  runSeed: false

# Enable PostgreSQL in cluster
# NOTE: Password is managed via sealed secret (argocd/postgres-sealed-secret.yaml)
# DO NOT put the password here - it would be exposed in git!
postgresql:
  enabled: true
  auth:
    username: ucebnice
    password: ""  # Managed via sealed secret - leave empty!
    database: ucebnice
  persistence:
    enabled: true
    storageClass: "longhorn"  # Use cluster default or specify
    size: 10Gi
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 0.5Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity: {}  # Disabled for single-node cluster
  # Uncomment below when you have multiple nodes:
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchExpressions:
  #             - key: app.kubernetes.io/name
  #               operator: In
  #               values:
  #                 - ucebnice
  #         topologyKey: kubernetes.io/hostname