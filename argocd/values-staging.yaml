# Staging values for ucebnice
# Override default values.yaml for staging environment

replicaCount: 2

image:
  repository: harbor.example.com/ucebnice/ucebnice-app
  pullPolicy: Always
  tag: "staging-latest"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: staging.ucebnice.yourdomain.com  # CHANGE THIS
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ucebnice-staging-tls
      hosts:
        - staging.ucebnice.yourdomain.com  # CHANGE THIS

config:
  NEXTAUTH_URL: "https://staging.ucebnice.yourdomain.com"  # CHANGE THIS

prisma:
  runMigrations: true
  runSeed: true