apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ucebnice
  namespace: argocd
  # Add finalizer to ensure proper cleanup
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # The project the application belongs to
  project: default

  # Source of the application manifests
  source:
    repoURL: git@github.com:EmperorKunDis/ucebniceNew.git  # SSH URL for private repo
    targetRevision: main  # Branch to track
    path: helm/ucebnice
    helm:
      # Helm values file(s) to use
      valueFiles:
        - values.yaml
        - ../../argocd/values-production.yaml  # Override with production values
      # Release name
      releaseName: ucebnice
      # NOTE: No hardcoded parameters! Use values files instead
      # The CI/CD workflow will update values files with new tags

  # Destination cluster and namespace to deploy the application
  destination:
    server: https://kubernetes.default.svc
    namespace: ucebnice

  # Sync policy
  syncPolicy:
    # Automated sync
    automated:
      # Automatically create namespace if it doesn't exist
      prune: true  # Automatically delete resources that are no longer defined in Git
      selfHeal: true  # Automatically sync when cluster state differs from Git
      allowEmpty: false  # Do not allow deletion of all resources

    # Sync options
    syncOptions:
      - CreateNamespace=true  # Create namespace if it doesn't exist
      - PrunePropagationPolicy=foreground  # Wait for resources to be deleted
      - PruneLast=true  # Prune resources as a last step
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true

    # Retry policy
    retry:
      limit: 5  # Number of times to retry a failed sync
      backoff:
        duration: 5s  # Amount to back off
        factor: 2  # Factor to multiply the base duration after each failed retry
        maxDuration: 3m  # Maximum amount of time allowed for a retry

  # Ignore differences in certain fields
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore replicas if using HPA