services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ucebnice-app:${APP_VERSION:-local}
    container_name: ucebnice-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ucebnice_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-ucebnice_db}
      VIDEO_FILES_DIR: /data/videa
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_TUTOR_MODEL: ${AI_TUTOR_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      - media_data:/data/videa
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:3000/api/health'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - ucebnice-network

  postgres:
    image: postgres:16-alpine
    container_name: ucebnice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ucebnice_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ucebnice_db}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-ucebnice_user} -d ${POSTGRES_DB:-ucebnice_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ucebnice-network

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local

networks:
  ucebnice-network:
    driver: bridge
