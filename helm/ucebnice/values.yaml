# Default values for ucebnice
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: harbor.example.com/ucebnice/ucebnice-app
  pullPolicy: IfNotPresent
  tag: "" # Overrides the image tag whose default is the chart appVersion

imagePullSecrets:
  - name: harbor-registry-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: ucebnice.praut.cz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ucebnice-tls
      hosts:
        - ucebnice.praut.cz

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ucebnice
          topologyKey: kubernetes.io/hostname

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables (non-sensitive)
env:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"

# ConfigMap for environment variables
config:
  NEXTAUTH_URL: "https://ucebnice.example.com"

# Secrets (create these manually or use External Secrets Operator)
# These should be provided via sealed-secrets or external secrets
secrets:
  # DATABASE_URL: "postgresql://user:password@postgres:5432/ucebnice"
  # NEXTAUTH_SECRET: "your-secret-key"
  # GOOGLE_CLIENT_ID: "your-google-client-id"
  # GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  # UPSTASH_REDIS_REST_URL: "your-upstash-url"
  # UPSTASH_REDIS_REST_TOKEN: "your-upstash-token"
  # NEXT_PUBLIC_SENTRY_DSN: "your-sentry-dsn"

# PostgreSQL configuration (optional - if deploying postgres in cluster)
postgresql:
  enabled: false
  auth:
    username: ucebnice
    password: changeme
    database: ucebnice
  primary:
    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 10Gi
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

# Redis configuration (optional - if deploying redis in cluster)
redis:
  enabled: false
  auth:
    enabled: true
    password: changeme
  master:
    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 1Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# Prisma migrations
prisma:
  # Run migrations as init container
  runMigrations: true
  # Run seed as a job
  runSeed: false

# Network policies
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: nginx-ingress
  egress:
    - to:
      - podSelector:
          matchLabels:
            app: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
      - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
      - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
