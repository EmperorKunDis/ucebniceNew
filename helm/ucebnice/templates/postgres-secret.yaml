{{- if and .Values.postgresql.enabled .Values.postgresql.auth.password -}}
{{- /* Only create this secret if password is explicitly provided in values (for local dev) */ -}}
{{- /* In production, use sealed secrets instead! */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ucebnice.fullname" . }}-postgres-secret
  labels:
    {{- include "ucebnice.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
data:
  username: {{ .Values.postgresql.auth.username | b64enc }}
  password: {{ .Values.postgresql.auth.password | b64enc }}
{{- end }}