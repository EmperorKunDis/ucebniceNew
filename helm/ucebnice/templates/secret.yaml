apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ucebnice.fullname" . }}-secret
  labels:
    {{- include "ucebnice.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.postgresql.enabled (not .Values.secrets.DATABASE_URL) }}
  {{- /* DATABASE_URL will be injected at runtime by reading from postgres secret */ -}}
  {{- /* This is a placeholder that will be overridden by an init script or external secret sync */ -}}
  {{- /* For now, leave it empty and we'll use a different approach */ -}}
  {{- end }}
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}