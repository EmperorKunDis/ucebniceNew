{{- if .Values.postgresql.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ucebnice.fullname" . }}-postgres
  labels:
    {{- include "ucebnice.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "ucebnice.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
{{- end }}