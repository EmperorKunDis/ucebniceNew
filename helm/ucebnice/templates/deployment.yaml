apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ucebnice.fullname" . }}
  labels:
    {{- include "ucebnice.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ucebnice.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ucebnice.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ucebnice.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.prisma.runMigrations }}
      initContainers:
        - name: prisma-migrate
          image: {{ include "ucebnice.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              {{- if .Values.postgresql.enabled }}
              # URL-encode the password for use in connection string
              ENCODED_PASSWORD=$(node -e "console.log(encodeURIComponent('${POSTGRES_PASSWORD}'))")
              # Construct DATABASE_URL from PostgreSQL secret
              export DATABASE_URL="postgresql://{{ .Values.postgresql.auth.username }}:${ENCODED_PASSWORD}@{{ include "ucebnice.fullname" . }}-postgres.{{ .Release.Namespace }}.svc.cluster.local:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
              {{- end }}
              # Install prisma CLI at runtime (matches version in package.json)
              # Use --legacy-peer-deps to prevent version conflicts and --exact for precise version
              npm install --no-save --legacy-peer-deps --exact prisma@6.19.0
              # Run migration using the locally installed prisma (not npx which might download latest)                                    
              ./node_modules/.bin/prisma migrate deploy
          env:
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ucebnice.fullname" . }}-postgres-secret
                  key: password
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ucebnice.fullname" . }}-secret
                  key: DATABASE_URL
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "ucebnice.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          command:
            - sh
            - -c
            - |
              {{- if .Values.postgresql.enabled }}
              # URL-encode the password for use in connection string
              ENCODED_PASSWORD=$(node -e "console.log(encodeURIComponent('${POSTGRES_PASSWORD}'))")
              # Construct DATABASE_URL from PostgreSQL secret
              export DATABASE_URL="postgresql://{{ .Values.postgresql.auth.username }}:${ENCODED_PASSWORD}@{{ include "ucebnice.fullname" . }}-postgres.{{ .Release.Namespace }}.svc.cluster.local:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
              {{- end }}
              # Start the application
              exec node server.js
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ucebnice.fullname" . }}-postgres-secret
                  key: password
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "ucebnice.fullname" . }}-config
            - secretRef:
                name: {{ include "ucebnice.fullname" . }}-secret
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}